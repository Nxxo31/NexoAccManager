<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoAccManager v3 — Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#DE350D', dark: '#B22A0A', light: '#FF5C33' },
            accent: { DEFAULT: '#6347FF', light: '#8B6FFF' },
            'bg-dark': '#0D0D0D',
            'bg-card': '#141414',
            'bg-surface': '#1A1A1A',
            'bg-elevated': '#222222',
            'text-primary': '#FFFFFF',
            'text-secondary': '#A0A0A0',
            'text-tertiary': '#6B6B6B',
            'border-custom': '#2A2A2A',
            'border-light': '#3A3A3A',
            success: '#2ED573',
            warning: '#FFA502',
            error: '#FF4757',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0D0D0D; font-family: 'Inter', sans-serif; color: #FFF; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3A3A3A; border-radius: 3px; }
    .row-hover:hover .row-actions { opacity: 1; transform: translateX(0); }
    .row-actions { opacity: 0; transform: translateX(10px); transition: all 150ms ease; }
    .row-selected .row-actions { opacity: 1; transform: translateX(0); }
    .row-selected { background: rgba(222, 53, 13, 0.08) !important; border-left: 2px solid #DE350D; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-online { background: #2ED573; }
    .dot-ingame { background: #DE350D; }
    .dot-offline { background: #6B6B6B; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-anim { animation: fadeIn 150ms ease; }
    .transition-all-150 { transition: all 150ms ease; }
    .btn-primary { background: #DE350D; color: white; }
    .btn-primary:hover { background: #B22A0A; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

  <!-- === HEADER === -->
  <header class="flex-shrink-0 flex items-center justify-between h-12 px-4 border-b border-border-custom">
    <div class="flex items-center gap-2">
      <div class="flex h-7 w-7 items-center justify-center rounded-md bg-primary">
        <svg class="h-3.5 w-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/>
          <rect x="2" y="6" width="20" height="12" rx="2"/>
        </svg>
      </div>
      <span class="text-sm font-bold tracking-tight">
        <span class="text-primary">Nexo</span><span class="text-white">Acc</span>
      </span>
      <span class="text-xs text-text-tertiary ml-2 font-mono">12/50</span>
    </div>
    <div class="flex items-center gap-1">
      <!-- Ocultar toggle -->
      <label class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs text-text-secondary cursor-pointer">
        <input type="checkbox" class="h-3 w-3 rounded border-border-custom">
        <span>Ocultar</span>
      </label>
      <!-- Ajustes -->
      <button class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs text-text-secondary hover:text-white hover:bg-bg-surface rounded-md transition-all-150">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Ajustes</span>
      </button>
    </div>
  </header>

  <!-- === MAIN — ACCOUNT TABLE === -->
  <div class="flex-1 overflow-y-auto p-4">
    <table class="w-full border-collapse">
      <thead>
        <tr class="text-left text-[10px] font-medium uppercase tracking-wide text-text-tertiary border-b border-border-custom">
          <th class="py-2 px-3 w-8"></th>
          <th class="py-2 px-3">Usuario</th>
          <th class="py-2 px-3">Alias</th>
          <th class="py-2 px-3">Descripción</th>
          <th class="py-2 px-3 w-32 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Row 1 — Selected -->
        <tr class="row-selected row-hover border-b border-border-custom transition-all-150">
          <td class="py-2.5 px-3"><span class="dot dot-ingame"></span></td>
          <td class="py-2.5 px-3 text-xs font-medium">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center text-[10px] font-bold">B</div>
              <span class="font-mono">BuildermanX42</span>
            </div>
          </td>
          <td class="py-2.5 px-3 text-xs text-text-secondary">Main Alt</td>
          <td class="py-2.5 px-3 text-xs text-text-tertiary">Grinding pet simulator</td>
          <td class="py-2.5 px-3 text-right">
            <div class="row-actions flex items-center justify-end gap-1">
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-error" title="Eliminar">
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-primary" title="Control">
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
              </button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-accent" title="Follow">
                <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
              </button>
            </div>
          </td>
        </tr>
        <!-- Row 2 — Hover state -->
        <tr class="row-hover hover:bg-bg-card border-b border-border-custom transition-all-150">
          <td class="py-2.5 px-3"><span class="dot dot-online"></span></td>
          <td class="py-2.5 px-3 text-xs font-medium">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-[10px] font-bold">R</div>
              <span class="font-mono">RobloxPro_99</span>
            </div>
          </td>
          <td class="py-2.5 px-3 text-xs text-text-secondary">Bank Account</td>
          <td class="py-2.5 px-3 text-xs text-text-tertiary">Storage for trades</td>
          <td class="py-2.5 px-3 text-right">
            <div class="row-actions flex items-center justify-end gap-1">
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-error"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-primary"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-accent"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></button>
            </div>
          </td>
        </tr>
        <!-- Row 3 -->
        <tr class="row-hover hover:bg-bg-card border-b border-border-custom transition-all-150">
          <td class="py-2.5 px-3"><span class="dot dot-offline"></span></td>
          <td class="py-2.5 px-3 text-xs font-medium">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-[10px] font-bold">A</div>
              <span class="font-mono text-text-secondary">AltFarmer_01</span>
            </div>
          </td>
          <td class="py-2.5 px-3 text-xs text-text-secondary">Farm Robot</td>
          <td class="py-2.5 px-3 text-xs text-text-tertiary">Auto-collect resources</td>
          <td class="py-2.5 px-3 text-right">
            <div class="row-actions flex items-center justify-end gap-1">
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-error"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-primary"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-accent"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></button>
            </div>
          </td>
        </tr>
        <!-- More rows would be here -->
        <tr class="row-hover hover:bg-bg-card border-b border-border-custom transition-all-150 opacity-60">
          <td class="py-2.5 px-3"><span class="dot dot-offline"></span></td>
          <td class="py-2.5 px-3 text-xs font-medium">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-yellow-500 to-orange-600 flex items-center justify-center text-[10px] font-bold">T</div>
              <span class="font-mono text-text-secondary">TradeMule_2024</span>
            </div>
          </td>
          <td class="py-2.5 px-3 text-xs text-text-secondary">Trading Alt</td>
          <td class="py-2.5 px-3 text-xs text-text-tertiary">Items storage</td>
          <td class="py-2.5 px-3 text-right">
            <div class="row-actions flex items-center justify-end gap-1">
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-error"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-primary"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg></button>
              <button class="p-1 rounded hover:bg-bg-surface text-text-tertiary hover:text-accent"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- === DOCK — Unified bar === -->
  <div class="flex-shrink-0 border-t border-border-custom bg-bg-card">
    <!-- Row 1: Place/Job inputs -->
    <div class="flex items-center gap-2 px-4 py-2">
      <label class="text-[10px] font-medium uppercase tracking-wide text-text-tertiary flex-shrink-0">Place ID</label>
      <input type="text" placeholder="ej: 5315046213" value="5315046213" class="flex-1 min-w-0 bg-bg-dark border border-border-custom rounded px-2 py-1 text-xs text-white placeholder:text-text-tertiary focus:outline-none focus:border-primary font-mono">
      <label class="text-[10px] font-medium uppercase tracking-wide text-text-tertiary flex-shrink-0 ml-2">Job ID</label>
      <input type="text" placeholder="opcional" class="flex-1 min-w-0 bg-bg-dark border border-border-custom rounded px-2 py-1 text-xs text-white placeholder:text-text-tertiary focus:outline-none focus:border-primary font-mono">
      <button class="p-1.5 rounded text-primary bg-primary/10" title="Shuffle activado">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
    </div>
    <!-- Row 2: Actions -->
    <div class="flex items-center gap-1.5 px-4 py-2 border-t border-border-custom/50">
      <!-- Primary: Agregar -->
      <button class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md btn-primary transition-all-150 text-white">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Agregar</span>
      </button>
      <!-- Divider -->
      <div class="w-px h-5 bg-border-custom mx-1"></div>
      <!-- Primary contextual: Jugar (unified Join Server + Abrir App) -->
      <button class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md btn-primary transition-all-150 text-white">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Join Server</span>
      </button>
      <!-- Servers — contextual (only when Place ID exists) -->
      <button class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium rounded-md bg-bg-surface text-white hover:bg-bg-elevated border border-border-custom transition-all-150">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        <span>Servers</span>
      </button>
      <div class="flex-1"></div>
      <!-- More — dropdown for secondary actions -->
      <button class="flex items-center gap-1 px-2.5 py-1.5 text-xs text-text-secondary hover:text-white hover:bg-bg-surface rounded-md transition-all-150" title="Más acciones">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </div>
  </div>

  <!-- === "More" dropdown preview (floating, statically positioned for mockup) === -->
  <div class="absolute bottom-12 right-4 w-52 rounded-lg border border-border-custom bg-bg-card shadow-2xl modal-anim z-50" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
    <div class="py-1">
      <button class="w-full flex items-center gap-2 px-3 py-2 text-xs text-text-secondary hover:text-white hover:bg-bg-surface">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Editar Alias
      </button>
      <button class="w-full flex items-center gap-2 px-3 py-2 text-xs text-text-secondary hover:text-white hover:bg-bg-surface">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Editar Descripción
      </button>
      <div class="border-t border-border-custom my-1"></div>
      <button class="w-full flex items-center gap-2 px-3 py-2 text-xs text-text-secondary hover:text-white hover:bg-bg-surface">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copiar Place ID
      </button>
      <button class="w-full flex items-center gap-2 px-3 py-2 text-xs text-text-tertiary">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Copiar rbx-player link
        <span class="ml-auto text-[9px] bg-border-custom px-1 rounded">próx</span>
      </button>
      <div class="border-t border-border-custom my-1"></div>
      <button class="w-full flex items-center justify-between gap-2 px-3 py-2 text-xs text-text-secondary hover:text-white hover:bg-bg-surface">
        <span class="flex items-center gap-2">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Auto Relaunch
        </span>
        <div class="w-7 h-4 rounded-full bg-border-custom"><div class="w-3 h-3 rounded-full bg-text-tertiary mt-0.5 ml-0.5"></div></div>
      </button>
      <button class="w-full flex items-center justify-between gap-2 px-3 py-2 text-xs text-text-secondary hover:text-white hover:bg-bg-surface">
        <span class="flex items-center gap-2">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          Connection Watcher
        </span>
        <div class="w-7 h-4 rounded-full bg-border-custom"><div class="w-3 h-3 rounded-full bg-text-tertiary mt-0.5 ml-0.5"></div></div>
      </button>
