<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NX-Manager - Compact & Dense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    /* Simple dark theme variables */
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --accent: #6347ff;
      --primary: #de350d;
      --border: #334155;
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent: #6347ff;
      --primary: #de350d;
      --border: #cbd5e1;
    }
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .nav-button {
      @apply p-2 rounded-md hover:bg-[var(--bg-tertiary)] transition-colors;
    }
    .nav-button.active {
      @apply bg-[var(--accent)]/20 text-[var(--accent)];
    }
    .account-row {
      @apply py-2 px-3 rounded-md hover:bg-[var(--bg-tertiary)] cursor-grab transition-colors;
    }
    .account-row.dragging {
      @apply opacity-50 scale-[0.98];
    }
    .group-badge {
      @apply px-2 py-0.5 text-xs rounded-full bg-[var(--bg-tertiary)]/50 text-[var(--text-secondary)] border border-[var(--border)]/30;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- Toolbar -->
  <header class="h-12 flex items-center px-4 border-b border-[var(--border)] bg-[var(--bg-secondary)]">
    <div class="flex items-center space-x-2">
      <div class="h-6 w-6 flex items-center justify-center bg-[var(--primary)]/20 text-[var(--primary)] rounded-md text-sm font-bold">
        NX
      </div>
      <span class="text-[var(--text-secondary)] font-medium">NX-Manager</span>
    </div>
    <div class="ml-auto flex items-center space-x-3">
      <button class="nav-button" title="ConfigBtn id="theme-toggle" aria-label="Cambiar tema">
        <i class="fa-solid fa-moon"></i>
      </button>
      <button class="nav-button" title="Configuración avanzada" aria-label="Configuración avanzada">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Left Slicer (Accounts) -->
    <aside class="w-64 border-r border-[var(--border)] bg-[var(--bg-secondary)] overflow-hidden flex flex-col">
      <div class="flex-1 overflow-y-auto p-3 space-y-2">
        <!-- Search -->
        <div class="flex items-center space-x-2">
          <input type="text" placeholder="Buscar cuentas..." class="flex-1 px-3 py-1.5 rounded-md bg-[var(--bg-tertiary)]/50 border border-[var(--border)]/30 text-[var(--text-primary)] placeholder-[var(--text-secondary)]/70 focus:outline-none focus:border-[var(--accent)] focus:bg-[var(--bg-tertiary)]" />
          <button class="p-1.5 rounded-md hover:bg-[var(--bg-tertiary)]" title="Agregar cuenta">
            <i class="fa-solid fa-plus text-[var(--primary)]"></i>
          </button>
        </div>
        <!-- Toggle show/hide -->
        <div class="flex items-center justify-between text-[var(--text-secondary)] text-sm">
          <span>Mostrar cuentas</span>
          <label class="relative inline-flex h-5 w-9">
            <input type="checkbox" class="sr-only peer" />
            <div class="w-9 h-5 bg-[var(--bg-tertiary)]/50 rounded-full cursor-pointer peer peer-checked:bg-[var(--accent)]/20 transition-colors">
              <div class="absolute left-0.5 top-0.5 h-4 w-4 bg-white rounded-full transform transition-transform peer-checked:translate-x-5"></div>
            </div>
          </label>
        </div>
        <!-- Accounts List -->
        <div class="mt-2 space-y-1">
          <!-- Account Rows -->
          <div class="account-row flex items-center space-x-3 cursor-grab" draggable="true">
            <div class="flex-shrink-0 h-8 w-8 flex items-center justify-center bg-[var(--primary)]/10 text-[var(--primary)] rounded-md text-xs font-medium">
              RBX
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between w-full">
                <div class="flex-1 truncate">
                  <div class="font-medium">BuilderMan123</div>
                  <div class="text-xs text-[var(--text-secondary)]">Constructor oficial</div>
                </div>
                <div class="flex items-center space-x-2 text-xs">
                  <span class="group-badge px-2 py-0.5">Amigos</span>
                  <span class="group-badge px-2 py-0.5">Desarrolladores</span>
                </div>
              </div>
            </div>
          </div>

          <div class="account-row flex items-center space-x-3 cursor-grab" draggable="true">
            <div class="flex-shrink-0 h-8 w-8 flex items-center justify-center bg-[var(--primary)]/10 text-[var(--primary)] rounded-md text-xs font-medium">
              RBX
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between w-full">
                <div class="flex-1 truncate">
                  <div class="font-medium">LuatexMaster</div>
                  <div class="text-xs text-[var(--text-secondary)]">Experto en Lua</div>
                </div>
                <div class="flex items-center space-x-2 text-xs">
                  <span class="group-badge px-2 py-0.5">Creadores</span>
                  <span class="group-badge px-2 py-0.5">Beta Testers</span>
                </div>
              </div>
            </div>
          </div>

          <div class="account-row flex items-center space-x-3 cursor-grab" draggable="true">
            <div class="flex-shrink-0 h-8 w-8 flex items-center justify-center bg-[var(--primary)]/10 text-[var(--primary)] rounded-md text-xs font-medium">
              RBX
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between w-full">
                <div class="flex-1 truncate">
                  <div class="font-medium">PixelArtist88</div>
                  <div class="text-xs text-[var(--text-secondary)]">Creador de ropa</div>
                </div>
                <div class="flex items-center space-x-2 text-xs">
                  <span class="group-badge px-2 py-0.5">Diseñadores</span>
                  <span class="group-badge px-2 py-0.5">Vendedores</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-hidden bg-[var(--bg-primary)]">
      <header class="h-12 flex items-center px-4 border-b border-[var(--border)] bg-[var(--bg-secondary)]">
        <h2 class="text-[var(--text-primary)] font-semibold text-lg">Cuentas de Roblox</h2>
      </header>
      <div class="flex-1 overflow-auto p-4 space-y-4">
        <!-- Placeholder for main content -->
        <div class="text-center py-12">
          <i class="fa-solid fa-users-gear text-4xl text-[var(--text-secondary)]/50 mb-4"></i>
          <p class="text-[var(--text-secondary)]">Seleccione una cuenta para ver detalles</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const currentTheme = localStorage.getItem('theme') || (prefersDark.matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.innerHTML = `<i class="fa-solid fa-${currentTheme === 'dark' ? 'sun' : 'moon'}"></i>`;
    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.innerHTML = `<i class="fa-solid fa-${newTheme === 'dark' ? 'sun' : 'moon'}"></i>`;
    });

    // Simple drag and drop simulation (visual only)
    const accountRows = document.querySelectorAll('.account-row');
    accountRows.forEach(row => {
      row.addEventListener('dragstart', () => {
        row.classList.add('dragging');
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
      });
    });
  </script>
</body>
</html>
