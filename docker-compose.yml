version: '3.8'

services:
  # PostgreSQL 15 Database
  db:
    image: postgres:15-alpine
    container_name: nexodb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexosecret}
      POSTGRES_DB: ${POSTGRES_DB:-nexoaccmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexo} -d ${POSTGRES_DB:-nexoaccmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (NexoAccManager-Backend)
  backend:
    build:
      context: ./NexoAccManager-Backend
      dockerfile: Dockerfile
    container_name: nexobackend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexo}:${POSTGRES_PASSWORD:-nexosecret}@db:5432/${POSTGRES_DB:-nexoaccmanager}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Landing Page (NexoAccManager-Landing)
  landing:
    build:
      context: ./NexoAccManager-Landing
      dockerfile: Dockerfile
    container_name: nexolanding
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nexonginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - landing

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: nexonet